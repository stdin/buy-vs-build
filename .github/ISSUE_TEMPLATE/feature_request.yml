name: Feature request
description: Suggest a new host integration, rule improvement, or benchmark case.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or pain point should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like to see? If it adds code or a dependency, note the buy-vs-build reasoning (which rung, and why reuse does not fit).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, if any.
    validations:
      required: false
